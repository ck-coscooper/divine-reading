<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE D'VINE ROOM | บทความ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ivory-bg: #fcfcf9; 
            --emerald-void: #062c1a;
            --emerald-deep: #041f13;
            --gold-main: #d4af37;
            --gold-bright: #f5d67b;
            --gold-line: rgba(212,175,55,0.28);
            --white-ivory: rgba(252, 252, 249, 0.98);
        }

        * { box-sizing:border-box; margin:0; padding:0; text-decoration:none !important; }
        html, body { overflow-x:hidden; width:100%; min-height:100vh; scroll-behavior:smooth; }
        
        body { 
            background-color: var(--ivory-bg); 
            color: var(--emerald-void); 
            font-family: 'IBM Plex Sans Thai', sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }

        body::before { 
            content:''; position:fixed; inset:0; opacity:0.12; 
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            pointer-events:none; z-index:0; 
        }

        .gold-text { 
            background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); 
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent; 
        }
        
        header {
            position: sticky; top: 0; z-index: 100;
            background: linear-gradient(180deg, rgba(6,44,26,0.99) 0%, rgba(4,31,19,0.97) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--gold-line);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }

        /* --- Master Locked Navigation --- */
        .nav-link { 
            font-family: 'Cinzel', serif;
            font-weight: 700;
            text-transform: uppercase; 
            color: #ffffff;
            border-bottom: 2px solid transparent;
            display: block; 
            padding: 10px clamp(10px, 2.5vw, 22px);
            font-size: clamp(9px, 2.2vw, 13px); 
            letter-spacing: clamp(1px, 0.4vw, 3px);
            transition: all 0.3s;
            opacity: 0.65;
            white-space: nowrap;
        }

        .nav-link:hover, .nav-link.active { 
            color: var(--gold-main); 
            opacity: 1; 
            letter-spacing: clamp(2px, 0.5vw, 4px);
        }
        .nav-link.active { border-bottom: 2px solid var(--gold-main); }

        @media (max-width: 480px) {
            nav {
                background: rgba(4, 31, 19, 0.95) !important;
                border-top: 1px solid rgba(212, 175, 55, 0.15) !important;
            }
            .nav-link {
                font-size: 10px !important;
                padding: 12px 10px !important; 
                letter-spacing: 1px !important;
            }
        }

        /* ── ARTICLE LIST ── */
        .article-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 2.5vw, 20px);
        }

        .article-row {
            background: var(--emerald-void);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212,175,55,0.06) 0%, transparent 40%),
                url("https://www.transparenttextures.com/patterns/asfalt-dark.png"), 
                linear-gradient(145deg, var(--emerald-void) 0%, var(--emerald-deep) 100%);
            border: 1px solid var(--gold-line);
            padding: clamp(20px, 4vw, 35px) clamp(18px, 4.5vw, 45px);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.7s cubic-bezier(0.15, 0.83, 0.66, 1);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            z-index: 1;
            -webkit-tap-highlight-color: transparent;
        }

        .article-row::before {
            content: ""; position: absolute; inset: 10px;
            border: 1px solid rgba(212,175,55,0.08);
            pointer-events: none; z-index: 2;
        }

        .article-row::after {
            content: ""; position: absolute; top: 18px; left: 18px; right: 18px; bottom: 18px;
            background: 
                linear-gradient(to right, var(--gold-main) 1.5px, transparent 1.5px) 0 0,
                linear-gradient(to bottom, var(--gold-main) 1.5px, transparent 1.5px) 0 0,
                linear-gradient(to left, var(--gold-main) 1.5px, transparent 1.5px) 100% 100%,
                linear-gradient(to top, var(--gold-main) 1.5px, transparent 1.5px) 100% 100%;
            background-repeat: no-repeat;
            background-size: clamp(10px, 2vw, 15px) clamp(10px, 2vw, 15px);
            opacity: 0.15; pointer-events: none; z-index: 2;
        }

        @media (hover: hover) {
            .article-row:hover {
                transform: scale(1.015) translateX(10px);
                border-color: var(--gold-bright);
            }
            .article-row:hover .article-number { opacity: 1; color: var(--gold-main); }
            .article-row:hover .article-title { color: #ffffff; }
        }

        .article-info {
            display: flex;
            align-items: center;
            gap: clamp(14px, 3vw, 35px);
            z-index: 5;
            flex: 1;
            min-width: 0;
        }

        .article-number {
            font-family: 'Cinzel', serif;
            font-size: clamp(16px, 3.5vw, 24px);
            font-weight: 700;
            color: var(--white-ivory);
            opacity: 0.4;
            min-width: clamp(28px, 5vw, 40px);
            flex-shrink: 0;
            transition: 0.4s;
        }

        .article-title {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: clamp(14px, 3vw, 22px);
            font-weight: 700;
            color: var(--gold-main);
            line-height: 1.4;
            transition: 0.4s;
        }

        .article-tag {
            font-family: 'Inter', sans-serif;
            font-size: clamp(7px, 1.5vw, 9px);
            font-weight: 600;
            letter-spacing: clamp(2px, 0.6vw, 4px);
            color: rgba(232,224,208,0.5);
            text-transform: uppercase;
            z-index: 5;
            flex-shrink: 0;
            margin-left: clamp(10px, 2vw, 20px);
            white-space: nowrap;
        }

        /* ── MOBILE ── */
        @media (max-width: 480px) {
            .article-row {
                flex-direction: row !important;
                align-items: center;
                padding: 18px 15px !important;
                gap: 15px;
            }
            .article-info { gap: 15px !important; }
            .article-number { font-size: 16px !important; min-width: 25px !important; opacity: 0.6; }
            .article-tag { display: none; }
            .article-row::after {
                content: "→";
                position: static;
                font-family: 'Inter', sans-serif;
                color: var(--gold-main);
                font-size: 14px;
                opacity: 0.8;
                background: none;
                width: auto;
                height: auto;
                border: none;
            }
            main { padding: 2.5rem 1rem 5rem !important; }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .article-row { padding: 22px 24px; }
            main { padding: 3rem 1.2rem 6rem !important; }
        }
    </style>
</head>
<body>

<header>
    <div style="display:flex;justify-content:flex-end;align-items:center;padding:7px 20px;gap:12px;border-bottom:1px solid rgba(212,175,55,0.08);">
        <div style="display:flex;gap:8px;">
            <button style="background:none;border:none;cursor:pointer;font-size:9px;letter-spacing:2px;color:#D4AF37;font-weight:700;">TH</button>
            <span style="color:#D4AF37;opacity:0.2;font-size:9px;">|</span>
            <button style="background:none;border:none;cursor:pointer;font-size:9px;letter-spacing:2px;color:#D4AF37;opacity:0.35;font-weight:700;">EN</button>
        </div>
        <span style="color:#D4AF37;opacity:0.1;">·</span>
        <button style="background:none;border:none;cursor:pointer;color:rgba(252,252,249,0.55);font-size:9px;letter-spacing:2px;font-weight:500;">SIGN IN</button>
        <button style="background:linear-gradient(45deg,#B38728,#FBF5B7,#AA771C);border:none;cursor:pointer;font-size:9px;font-weight:800;color:#041f13;padding:5px 12px;border-radius:1px;letter-spacing:1px;">SIGN UP</button>
    </div>

    <div style="text-align:center;padding:14px 16px 10px;">
        <h1 class="gold-text" style="font-family:'Cinzel',serif;font-size:clamp(1.2rem, 6vw, 2.2rem);letter-spacing:clamp(2px, 1.2vw, 8px);font-weight:700;line-height:1.2;">THE D'VINE ROOM</h1>
        <p class="gold-text" style="font-family:'Cinzel',serif;font-size:clamp(7px, 1.8vw, 11px);letter-spacing:2px;margin-top:3px;opacity:0.85;">SCARS OF THE DIVINE / AJ. FAAN</p>
    </div>

    <nav style="border-top:1px solid rgba(212,175,55,0.12);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;">
        <div style="display:flex;justify-content:center;min-width:fit-content;padding:0 8px;">
            <a href="learn.html" class="nav-link active">LEARN</a>
            <a href="tarot.html" class="nav-link">TAROT</a>
            <a href="index.html" class="nav-link">READING</a>
            <a href="almanac.html" class="nav-link">ALMANAC</a>
            <a href="community.html" class="nav-link">COMMUNITY</a>
        </div>
    </nav>
</header>

<main style="padding:3rem 1.5rem 8rem; position:relative; z-index:1;">
    <div style="margin-bottom:3.5rem; text-align:center;">
        <a href="learn.html" style="font-family:'Cinzel',serif;font-size:clamp(9px,1.8vw,13px);letter-spacing:clamp(2px,0.5vw,3px);color:var(--emerald-void);opacity:0.6;text-transform:uppercase;display:inline-block;margin-bottom:1.8rem;padding:7px 14px;border:1px solid rgba(6,44,26,0.2);transition:all 0.3s;">← BACK TO LEARN</a>
        <h2 style="font-family:'Cinzel',serif;font-size:clamp(2rem, 6vw, 4rem);letter-spacing:0.25em;font-weight:700;color:var(--emerald-void);line-height:1.2;text-transform:uppercase;">ARTICLES</h2>
        <div style="width:44px;height:1px;background:var(--gold-main);margin:20px auto;opacity:0.6;"></div>
        <p style="color:var(--emerald-void);font-size:clamp(8px,2vw,10px);letter-spacing:0.45em;font-weight:600;opacity:0.5;text-transform:uppercase;">Deep Insights & Sovereignty</p>
    </div>

    <div class="article-container">
        <a href="article-detail-1.html" class="article-row">
            <div class="article-info">
                <div class="article-number">01</div>
                <div class="article-title">ไพ่ที่บอกว่าคุณกำลังโกหกตัวเอง</div>
            </div>
            <div class="article-tag">Read Insights →</div>
        </a>

        <a href="#" class="article-row">
            <div class="article-info">
                <div class="article-number">02</div>
                <div class="article-title">วิเคราะห์พิกัดดาวอังคารฉบับกุนซือ</div>
            </div>
            <div class="article-tag">Coming Soon</div>
        </a>

        <a href="#" class="article-row">
            <div class="article-info">
                <div class="article-number">03</div>
                <div class="article-title">ความลับของระบบโซเชียลกับพลังงานดวงดาว</div>
            </div>
            <div class="article-tag">Coming Soon</div>
        </a>
    </div>
</main>

<script>
    if ('ontouchstart' in window) {
        document.querySelectorAll('.article-row').forEach(item => {
            item.addEventListener('touchstart', () => {
                item.style.transform = 'scale(0.98)';
                item.style.transition = 'all 0.12s ease';
            }, {passive: true});
            item.addEventListener('touchend', () => {
                item.style.transform = '';
                item.style.transition = 'all 0.5s cubic-bezier(0.15, 0.83, 0.66, 1)';
            }, {passive: true});
        });

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('touchend', function(e) {
                e.preventDefault();
                window.location.href = this.getAttribute('href');
            });
        });
    }
</script>
</body>
</html>
