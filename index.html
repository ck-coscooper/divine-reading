<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAROT / AJARN FAAN | World-Class Professional Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Sarabun:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-green: #013220;
            --gold-foil: #D4AF37;
            --gold-bright: #FFD700;
            --deep-dark: #050805;
        }

        body {
            background-color: var(--deep-dark);
            color: #e0e0e0;
            font-family: 'Sarabun', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, .font-cinzel { font-family: 'Cinzel', serif; }

        .gold-gradient-text {
            background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gold-border {
            border: 1px solid transparent;
            background-image: linear-gradient(var(--forest-green), var(--forest-green)), radial-gradient(circle at top left, #f5d67b, #d4af37);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        .btn-gold {
            background: linear-gradient(45deg, #B38728, #FBF5B7, #AA771C);
            color: var(--forest-green);
            font-weight: 700;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-gold:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.4);
            filter: brightness(1.1);
        }

        .btn-gold:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        input, select, textarea {
            background-color: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(212, 175, 55, 0.2) !important;
            color: white !important;
            padding: 12px 15px !important;
            border-radius: 0 !important;
        }

        input:focus { border-color: var(--gold-foil) !important; outline: none; }

        /* Animation Carousel Styles */
        .card-strip-container {
            width: 100%;
            height: 400px;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
        }

        .card-strip {
            display: flex;
            gap: 20px;
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 320px;
            align-items: center;
        }

        .ritual-card {
            min-width: 200px;
            height: 320px;
            background: linear-gradient(135deg, var(--forest-green) 0%, #000 100%);
            border: 2px solid var(--gold-foil);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel';
            color: var(--gold-foil);
            font-size: 1.2rem;
            position: relative;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
            flex-shrink: 0;
        }

        .animate-fast { animation: slideLeft 0.8s linear infinite; }

        @keyframes slideLeft {
            from { transform: translateX(0) translateY(-50%); }
            to { transform: translateX(-440px) translateY(-50%); }
        }

        .result-reveal {
            animation: popIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; filter: blur(15px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        .forest-overlay {
            background: radial-gradient(circle at center, rgba(1, 50, 32, 0.3) 0%, rgba(5, 8, 5, 1) 100%);
        }

        .scanning-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--gold-bright);
            box-shadow: 0 0 15px var(--gold-bright);
            top: 0;
            left: 0;
            animation: scanMove 2s linear infinite;
            z-index: 20;
        }

        @keyframes scanMove {
            0% { top: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col forest-overlay">

    <header class="p-6 flex justify-between items-center border-b border-yellow-900/20 bg-black/60 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-xl md:text-2xl font-cinzel gold-gradient-text tracking-widest font-bold">TAROT / AJARN FAAN</h1>
        <div id="live-clock" class="text-[10px] text-gold-foil font-light opacity-60 tracking-widest uppercase"></div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4">
        
        <!-- STEP 1: Identification -->
        <div id="step-login" class="w-full max-w-xl p-8 md:p-12 gold-border bg-black/80 space-y-8 shadow-2xl relative">
            <div class="text-center">
                <h2 class="text-3xl font-cinzel gold-gradient-text mb-2 uppercase">Identification</h2>
                <p class="text-xs text-gray-500 tracking-[0.2em] font-light uppercase">กรุณาระบุพิกัดตัวตนเพื่อเริ่มการวินิจฉัย</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="text-gold-foil text-[10px] uppercase mb-2 block tracking-widest">Full Name / นามแห่งท่าน</label>
                    <input type="text" id="fullname" class="w-full text-lg" placeholder="ระบุชื่อ-นามสกุล">
                </div>
                
                <div class="grid grid-cols-3 gap-4">
                    <div><label class="text-gold-foil text-[10px] uppercase mb-2 block">Day</label><select id="birth-day" class="w-full"></select></div>
                    <div><label class="text-gold-foil text-[10px] uppercase mb-2 block">Month</label><select id="birth-month" class="w-full"></select></div>
                    <div><label class="text-gold-foil text-[10px] uppercase mb-2 block">Year (พ.ศ.)</label><input type="number" id="birth-year" class="w-full" value="2530"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-gold-foil text-[10px] uppercase mb-2 block">Hour</label><select id="birth-hour" class="w-full"></select></div>
                    <div><label class="text-gold-foil text-[10px] uppercase mb-2 block">Minute</label><select id="birth-minute" class="w-full"></select></div>
                </div>
            </div>
            <button onclick="proceedToRitual()" class="w-full btn-gold py-5 text-sm shadow-xl mt-6">เข้าสู่ห้องทำนาย</button>
        </div>

        <!-- STEP 2: Ritual & Prayer -->
        <div id="step-ritual" class="hidden w-full max-w-4xl p-10 gold-border bg-black/90 space-y-10 text-center">
            <div id="user-stats" class="space-y-2 border-b border-yellow-900/20 pb-8"></div>
            <div class="space-y-6">
                <h3 class="text-gold-foil font-cinzel text-xl tracking-widest uppercase">ถ้อยแถลงต่อสัญชาตญาณ</h3>
                <textarea id="prayer" class="w-full h-32 bg-black border border-yellow-900/30 p-4 text-white focus:border-gold-foil transition-all" placeholder="ระบุปมในใจ บาดแผล หรือสิ่งที่ท่านต้องการหาทางออกในครั้งนี้..."></textarea>
                <div class="py-4">
                    <p class="text-sm text-gray-400 mb-8 italic">"จงรวบรวมสมาธิให้มั่นคงที่สุด เมื่อพร้อมแล้วกดเริ่มเพื่อสุ่มไพ่"</p>
                    <button id="start-btn" onclick="startAnimation()" class="btn-gold px-12 py-4">Start Ritual</button>
                </div>
            </div>
        </div>

        <!-- STEP 3: Animation Loop -->
        <div id="step-animation" class="hidden w-full flex flex-col items-center justify-center space-y-12">
            <div class="text-center space-y-4">
                <div id="countdown" class="text-8xl font-cinzel text-gold-bright drop-shadow-[0_0_20px_rgba(212,175,55,0.6)]">10</div>
                <p class="text-gold-foil tracking-[0.4em] uppercase text-sm animate-pulse">Professional Spectrum Scanning...</p>
            </div>
            <div class="card-strip-container">
                <div id="card-strip" class="card-strip animate-fast"></div>
                <div class="absolute inset-0 border-x-[40px] border-black/40 pointer-events-none"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[220px] h-[340px] border-4 border-gold-bright z-10 shadow-[0_0_50px_rgba(212,215,0,0.3)]">
                    <div class="scanning-line"></div>
                </div>
            </div>
        </div>

        <!-- STEP 4: Result -->
        <div id="step-result" class="hidden w-full max-w-6xl flex flex-col lg:flex-row items-center gap-12 p-6">
            <div id="final-card-display" class="flex-shrink-0 result-reveal"></div>
            <div class="flex-grow space-y-8 bg-black/40 p-8 md:p-12 border border-yellow-900/10 backdrop-blur-xl relative">
                <div class="border-l-4 border-gold-foil pl-8">
                    <div class="text-xs text-gold-foil/60 uppercase tracking-widest mb-2 font-bold">Analytical Diagnosis</div>
                    <h2 id="res-card-name" class="text-4xl md:text-5xl font-cinzel gold-gradient-text uppercase font-bold"></h2>
                    <p id="res-card-sub" class="text-sm text-gray-400 italic mt-1 font-sarabun"></p>
                </div>
                <div id="res-analysis" class="text-lg leading-relaxed font-light text-gray-200 space-y-6 font-sarabun">
                    <!-- AI Content will be injected here -->
                </div>
                <div class="pt-8 border-t border-yellow-900/10">
                    <button onclick="location.reload()" class="text-[10px] text-gold-foil uppercase tracking-widest border-b border-gold-foil/30 hover:border-gold-foil pb-1 transition-all">วิเคราะห์ปัญหาอื่น</button>
                </div>
            </div>
        </div>

    </main>

    <footer class="p-6 text-center text-[10px] text-gray-600 tracking-[0.4em] uppercase">
        &copy; 2026 AJARN FAAN | AUTHORITY ANALYTICAL SYMBOLISM
    </footer>

    <script>
        // *** สำคัญ: ต้องใส่ API Key ของคุณที่นี่เพื่อให้คำทำนายแสดงผลบน Vercel ***
        const apiKey = ""; 

        let currentUser = {};
        const tarotDeck = [
            { name: "The Fool", img: "https://upload.wikimedia.org/wikipedia/commons/9/90/RWS_Tarot_00_Fool.jpg", sub: "สัญชาตญาณเดิมและการเริ่มต้น" },
            { name: "The Magician", img: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg", sub: "ศักยภาพที่ยังไม่จัดระเบียบ" },
            { name: "The High Priestess", img: "https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg", sub: "เสียงกระซิบจากความลึกลับ" },
            { name: "The Empress", img: "https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg", sub: "ความอุดมสมบูรณ์และอำนาจฝ่ายหญิง" },
            { name: "The Emperor", img: "https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg", sub: "โครงสร้างและความรับผิดชอบ" },
            { name: "The Hierophant", img: "https://upload.wikimedia.org/wikipedia/commons/8/8d/RWS_Tarot_05_Hierophant.jpg", sub: "ความเชื่อและกรอบประเพณี" },
            { name: "The Lovers", img: "https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_06_Lovers.jpg", sub: "การเลือกและแรงดึงดูด" },
            { name: "The Chariot", img: "https://upload.wikimedia.org/wikipedia/commons/9/9b/RWS_Tarot_07_Chariot.jpg", sub: "การควบคุมและชัยชนะ" },
            { name: "Strength", img: "https://upload.wikimedia.org/wikipedia/commons/f/f5/RWS_Tarot_08_Strength.jpg", sub: "ความอดทนและพลังภายใน" },
            { name: "The Hermit", img: "https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_09_Hermit.jpg", sub: "ความวิเวกและการค้นพบตนเอง" },
            { name: "The Wheel of Fortune", img: "https://upload.wikimedia.org/wikipedia/commons/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg", sub: "กงล้อแห่งชะตากรรม" },
            { name: "Justice", img: "https://upload.wikimedia.org/wikipedia/commons/e/e0/RWS_Tarot_11_Justice.jpg", sub: "ความยุติธรรมและกฎแห่งกรรม" },
            { name: "The Hanged Man", img: "https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_12_Hanged_Man.jpg", sub: "การเสียสละและมุมมองใหม่" },
            { name: "Death", img: "https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg", sub: "การสิ้นสุดเพื่อเกิดใหม่" },
            { name: "Temperance", img: "https://upload.wikimedia.org/wikipedia/commons/f/f8/RWS_Tarot_14_Temperance.jpg", sub: "ความสมดุลและการปรับตัว" },
            { name: "The Devil", img: "https://upload.wikimedia.org/wikipedia/commons/5/55/RWS_Tarot_15_Devil.jpg", sub: "พันธนาการแห่งกิเลส" },
            { name: "The Tower", img: "https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_16_Tower.jpg", sub: "ความย่อยยับที่สว่างแจ้ง" },
            { name: "The Star", img: "https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg", sub: "ความหวังและการเยียวยา" },
            { name: "The Moon", img: "https://upload.wikimedia.org/wikipedia/commons/f/f0/RWS_Tarot_18_Moon.jpg", sub: "ภาพลวงตาและความกลัว" },
            { name: "The Sun", img: "https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg", sub: "ความสำเร็จและพลังอำนาจ" },
            { name: "Judgement", img: "https://upload.wikimedia.org/wikipedia/commons/d/dd/RWS_Tarot_20_Judgement.jpg", sub: "การปลุกตื่นและการประกาศผล" },
            { name: "The World", img: "https://upload.wikimedia.org/wikipedia/commons/f/ff/RWS_Tarot_21_World.jpg", sub: "ความสมบูรณ์แบบและการหลุดพ้น" }
        ];

        window.onload = () => {
            populate('birth-day', 1, 31);
            populate('birth-month', 1, 12);
            populate('birth-hour', 0, 23, true);
            populate('birth-minute', 0, 59, true);
            setInterval(updateClock, 1000);
            updateClock();
        };

        function populate(id, start, end, pad = false) {
            const el = document.getElementById(id);
            for (let i = start; i <= end; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.innerText = pad ? i.toString().padStart(2, '0') : i;
                el.appendChild(opt);
            }
        }

        function updateClock() {
            const clock = document.getElementById('live-clock');
            const now = new Date();
            clock.innerText = now.toLocaleString('th-TH', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });
        }

        function proceedToRitual() {
            const name = document.getElementById('fullname').value;
            const year = parseInt(document.getElementById('birth-year').value);
            if (!name || isNaN(year)) {
                alert("กรุณาระบุข้อมูลระบุตัวตนให้ครบถ้วน");
                return;
            }

            const d = parseInt(document.getElementById('birth-day').value);
            const m = parseInt(document.getElementById('birth-month').value);
            const hr = parseInt(document.getElementById('birth-hour').value);
            const min = parseInt(document.getElementById('birth-minute').value);

            let birthYearAD = year > 2400 ? year - 543 : year;
            const birthDate = new Date(birthYearAD, m - 1, d, hr, min);
            const now = new Date();
            const daysLived = Math.floor((now - birthDate) / (1000 * 60 * 60 * 24));
            
            let thaiDayIndex = birthDate.getDay();
            if (hr < 6) thaiDayIndex = (thaiDayIndex + 6) % 7;
            const thaiDays = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];

            currentUser = { name, daysLived, dayName: thaiDays[thaiDayIndex], birthStr: `${d}/${m}/${year}` };

            document.getElementById('user-stats').innerHTML = `
                <h2 class="text-3xl font-cinzel gold-gradient-text uppercase font-bold">${name}</h2>
                <p class="text-sm tracking-widest text-gray-400 mt-2">พิกัดชะตา: เกิดวัน${thaiDays[thaiDayIndex]} | เผชิญโลกมาแล้ว <span class="text-gold-bright font-bold">${daysLived.toLocaleString()}</span> วัน</p>
            `;

            document.getElementById('step-login').classList.add('hidden');
            document.getElementById('step-ritual').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        async function startAnimation() {
            const prayer = document.getElementById('prayer').value.trim();
            if (!prayer) {
                alert("กรุณาระบุถ้อยแถลงหรือปมในใจเพื่อให้ไพ่สะท้อนความจริง");
                return;
            }
            currentUser.prayer = prayer;

            document.getElementById('step-ritual').classList.add('hidden');
            document.getElementById('step-animation').classList.remove('hidden');
            window.scrollTo(0,0);

            const strip = document.getElementById('card-strip');
            strip.innerHTML = '';
            for(let i=0; i<60; i++) {
                const card = document.createElement('div');
                card.className = 'ritual-card';
                card.innerHTML = `<span class="opacity-40">TAROT</span>`;
                strip.appendChild(card);
            }

            // เตรียมข้อมูล AI ล่วงหน้า
            let aiResult = null;
            const finalCard = tarotDeck[Math.floor(Math.random() * tarotDeck.deck?.length || tarotDeck.length)];
            
            // เริ่มดึงข้อมูลทันทีขณะ Animation ทำงาน
            const fetchPromise = fetchAI(finalCard);

            let seconds = 10;
            const countdownEl = document.getElementById('countdown');
            const timer = setInterval(async () => {
                seconds--;
                countdownEl.innerText = seconds;
                if (seconds <= 0) {
                    clearInterval(timer);
                    aiResult = await fetchPromise;
                    showFinalResult(finalCard, aiResult);
                }
            }, 1000);
        }

        async function fetchAI(card) {
            if (!apiKey) return "ระบบตรวจพบว่าไม่มี API Key กรุณาตรวจสอบการตั้งค่าบน Vercel (Environment Variables)";

            const systemPrompt = `คุณคืออาจารย์ฟาณ (Ajarn Faan) กุนซือวิเคราะห์ดวงชะตาเชิงสัญลักษณ์ บุคลิก: นิ่ง ตรง มีอำนาจ
            วินิจฉัยคำอธิษฐานผ่านสถิติชีวิตและหน้าไพ่
            - ผู้รับคำปรึกษา: ${currentUser.name} (เผชิญโลกมา ${currentUser.daysLived} วัน)
            - ปมในใจ: ${currentUser.prayer}
            - หน้าไพ่: ${card.name}
            
            แนวทาง:
            1. ฟันธงสภาวะปัจจุบันในย่อหน้าแรกทันที
            2. วิเคราะห์ปมในใจผ่านไพ่ ${card.name}
            3. ให้ทางออกเฉียบขาด เน้นคำว่า 'การจัดระเบียบชีวิต' หรือ 'สัญชาตญาณเดิม'
            เขียน 3 ย่อหน้าสั้นๆ เฉียบคม ห้ามใช้คำปลอบใจเกินจริง`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
                });
                const data = await res.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "พิกัดสมาธิขัดข้อง กรุณาลองใหม่อีกครั้ง";
            } catch (e) {
                return "การเชื่อมต่อสัญญาณดวงดาวขัดข้อง: " + e.message;
            }
        }

        function showFinalResult(card, text) {
            document.getElementById('step-animation').classList.add('hidden');
            document.getElementById('step-result').classList.remove('hidden');
            window.scrollTo(0,0);

            document.getElementById('final-card-display').innerHTML = `
                <div class="w-[300px] h-[480px] rounded-xl overflow-hidden border-[6px] border-gold-foil shadow-[0_0_60px_rgba(212,175,55,0.3)] relative bg-black">
                    <img src="${card.img}" class="w-full h-full object-cover" alt="${card.name}">
                    <div class="absolute bottom-0 left-0 right-0 bg-black/90 p-5 text-center border-t border-gold-foil/40 backdrop-blur-md">
                        <span class="font-cinzel text-gold-foil text-lg tracking-[0.2em] uppercase font-bold">${card.name}</span>
                    </div>
                </div>
            `;

            document.getElementById('res-card-name').innerText = card.name;
            document.getElementById('res-card-sub').innerText = card.sub;
            document.getElementById('res-analysis').innerHTML = text.split('\n').filter(p=>p.trim()).map(p => `<p class="mb-4">${p}</p>`).join('');
        }
    </script>
</body>
</html>
