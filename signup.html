<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE D'VINE ROOM | Join Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IBM+Plex+Sans+Thai:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --ivory: #fcfcf9; --emerald: #062c1a; --gold: #d4af37; }
        body { background-color: var(--ivory); font-family: 'IBM Plex Sans Thai', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        input { border: none !important; border-bottom: 1px solid rgba(6, 44, 26, 0.1) !important; background: transparent !important; padding: 12px 0 !important; width: 100%; outline: none; font-size: 14px; }
        input:focus { border-bottom-color: var(--gold) !important; }
        .btn-auth { background: var(--gold); color: var(--emerald); padding: 16px; font-family: 'Cinzel', serif; letter-spacing: 3px; font-size: 11px; font-weight: 700; width: 100%; margin-top: 2rem; }
    </style>
</head>
<body>
    <header class="bg-[#062c1a] py-4 px-6 border-b border-[#d4af37]/20">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xs text-white tracking-[0.4em] font-cinzel">THE D'VINE ROOM</a>
            <a href="index.html" class="text-white text-[10px] tracking-[0.2em] font-cinzel opacity-70">← BACK TO HOME</a>
        </div>
    </header>
    <main class="flex-grow flex items-center justify-center px-6">
        <div class="w-full max-w-sm">
            <div class="text-center mb-10">
                <h1 class="font-cinzel text-3xl tracking-[0.2em] mb-4 text-[#062c1a]">CREATE ACCOUNT</h1>
                <p class="text-[10px] tracking-[0.3em] uppercase opacity-40">Join the sovereign knowledge circle</p>
            </div>
            <form class="space-y-6">
                <div><label class="text-[9px] font-bold tracking-widest uppercase opacity-60">Full Name</label><input type="text" placeholder="John Doe"></div>
                <div><label class="text-[9px] font-bold tracking-widest uppercase opacity-60">Email Address</label><input type="email" placeholder="email@example.com"></div>
                <div><label class="text-[9px] font-bold tracking-widest uppercase opacity-60">Password</label><input type="password" placeholder="Create Password"></div>
                <button type="submit" class="btn-auth">SIGN UP NOW</button>
            </form>
            <div class="mt-8 text-center"><a href="signin.html" class="text-[10px] tracking-[0.2em] opacity-40 hover:opacity-100 transition-opacity uppercase">Already have an account? Sign In</a></div>
        </div>
    </main>
</body>
</html>
