<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE D'VINE ROOM | Sign up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { max-width:100%; box-sizing:border-box; margin:0; padding:0; }
        html,body { overflow-x:hidden; width:100%; }
        body { background-color:#013220; color:#e8e0d0; font-family:'IBM Plex Sans Thai',sans-serif; -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; min-height:100vh; }
        .gold-text { background:linear-gradient(to bottom,#BF953F,#FCF6BA,#B38728,#FBF5B7,#AA771C); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .gold-border { border:1px solid transparent; background-image:linear-gradient(#0e0c09,#0e0c09), radial-gradient(circle at top left,#f5d67b,#d4af37); background-origin:border-box; background-clip:padding-box,border-box; }
        .btn-gold { background:linear-gradient(45deg,#B38728,#FBF5B7,#AA771C); color:#013220; font-weight:700; letter-spacing:2px; transition:all 0.3s; }
        input { background:rgba(255,255,255,0.95) !important; border:1px solid rgba(212,175,55,0.4) !important; color:#000 !important; border-radius:4px !important; padding:12px 16px !important; height:auto !important; width:100%; font-family:'IBM Plex Sans Thai',sans-serif !important; font-size:14px !important; outline:none; transition:border 0.3s; }
        input:focus { border-color:#D4AF37 !important; }
        input::placeholder { color:rgba(0,0,0,0.35) !important; }
    </style>
</head>
<body>
<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;">
    <div style="margin-bottom:2rem;text-align:center;">
        <svg width="40" height="53" viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="52" height="72" rx="6" fill="transparent" stroke="#D4AF37" stroke-width="2.5"/>
            <rect x="9" y="9" width="42" height="62" rx="4" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.4"/>
            <polygon points="30,22 32.5,30 41,30 34.5,35 37,43 30,38 23,43 25.5,35 19,30 27.5,30" fill="#D4AF37"/>
        </svg>
        <h1 class="gold-text" style="font-family:'Cinzel',serif;font-size:clamp(1.1rem,3vw,1.8rem);letter-spacing:8px;font-weight:700;margin-top:1rem;">THE D'VINE ROOM</h1>
        <p style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:#D4AF37;margin-top:4px;">SCARS OF THE DIVINE / AJ. FAAN</p>
    </div>

    <div class="gold-border" style="width:100%;max-width:420px;border-radius:12px;padding:2.5rem 2rem;">
        <h2 style="font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:4px;color:#FFD700;text-align:center;margin-bottom:0.5rem;">SIGN UP</h2>
        <p style="font-size:12px;color:#ffffff;text-align:center;margin-bottom:2rem;letter-spacing:0;">สร้างบัญชีเพื่อใช้งาน</p>

        <div style="display:flex;flex-direction:column;gap:1rem;">
            <div>
                <label style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(212,175,55,0.7);text-transform:uppercase;display:block;margin-bottom:8px;">Name</label>
                <input type="text" placeholder="ชื่อของท่าน">
            </div>
            <div>
                <label style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:2px;color:#D4AF37;text-transform:uppercase;display:block;margin-bottom:8px;">Email</label>
                <input type="email" placeholder="your@email.com">
            </div>
            <div>
                <label style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:2px;color:#D4AF37;text-transform:uppercase;display:block;margin-bottom:8px;">Password</label>
                <input type="password" placeholder="••••••••">
            </div>

            <div style="border-top:1px solid rgba(212,175,55,0.1);padding-top:1rem;margin-top:0.5rem;">
                <p style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:#FFD700;text-transform:uppercase;margin-bottom:1rem;">Birth Coordinates</p>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;">
                    <div>
                        <label style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:1px;color:rgba(212,175,55,0.7);display:block;margin-bottom:6px;">Day</label>
                        <input type="number" placeholder="17" min="1" max="31">
                    </div>
                    <div>
                        <label style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:1px;color:rgba(212,175,55,0.7);display:block;margin-bottom:6px;">Month</label>
                        <input type="number" placeholder="1" min="1" max="12">
                    </div>
                    <div>
                        <label style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:1px;color:rgba(212,175,55,0.7);display:block;margin-bottom:6px;">Year</label>
                        <input type="text" placeholder="2529">
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
                    <div>
                        <label style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:1px;color:rgba(212,175,55,0.7);display:block;margin-bottom:6px;">Hour</label>
                        <input type="number" placeholder="03" min="0" max="23">
                    </div>
                    <div>
                        <label style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:1px;color:rgba(212,175,55,0.7);display:block;margin-bottom:6px;">Minute</label>
                        <input type="number" placeholder="35" min="0" max="59">
                    </div>
                </div>
                <div>
                    <label style="font-family:'Inter',sans-serif;font-size:10px;letter-spacing:1px;color:rgba(212,175,55,0.7);display:block;margin-bottom:6px;">Place of Birth</label>
                    <input type="text" placeholder="Bangkok, Chiang Mai...">
                </div>
            </div>

            <button onclick="handleSignup()" class="btn-gold" style="width:100%;padding:14px;border:none;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;border-radius:4px;margin-top:0.5rem;letter-spacing:2px;">
                CREATE ACCOUNT
            </button>
        </div>

        <div style="margin-top:1.5rem;text-align:center;">
            <p style="font-size:12px;color:#ffffff;letter-spacing:0;">มีบัญชีแล้ว? <a href="signin.html" style="color:#FFD700;text-decoration:none;">เข้าสู่ระบบ</a></p>
        </div>
    </div>

    <a href="index.html" style="margin-top:1.5rem;font-family:'Inter',sans-serif;font-size:10px;letter-spacing:3px;color:#ffffff;text-decoration:none;text-transform:uppercase;">← HOME</a>
</div>

<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;align-items:center;justify-content:center;">
    <div class="gold-border" style="max-width:360px;width:90%;border-radius:12px;padding:2.5rem 2rem;text-align:center;background:#0e0c09;">
        <svg width="40" height="53" viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg" style="margin:0 auto 1.5rem;">
            <rect x="4" y="4" width="52" height="72" rx="6" fill="transparent" stroke="#D4AF37" stroke-width="2.5"/>
            <rect x="9" y="9" width="42" height="62" rx="4" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.4"/>
            <polygon points="30,22 32.5,30 41,30 34.5,35 37,43 30,38 23,43 25.5,35 19,30 27.5,30" fill="#D4AF37"/>
        </svg>
        <h3 style="font-family:'Cinzel',serif;font-size:1rem;letter-spacing:3px;color:#D4AF37;margin-bottom:1rem;">COMING SOON</h3>
        <p style="font-size:13px;color:rgba(232,224,208,0.6);line-height:1.8;letter-spacing:0;">ระบบสมาชิกกำลังจะเปิดเร็วๆ นี้<br>ฝากอีเมลไว้รับการแจ้งเตือนก่อนใคร</p>
        <input type="email" id="waitlist-email" placeholder="your@email.com" style="margin-top:1.5rem;">
        <button onclick="saveEmail()" class="btn-gold" style="width:100%;padding:12px;border:none;cursor:pointer;font-family:'Cinzel',serif;font-size:10px;border-radius:4px;margin-top:1rem;letter-spacing:2px;">แจ้งเตือนฉัน</button>
        <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:rgba(232,224,208,0.3);font-size:11px;margin-top:1rem;font-family:'Inter',sans-serif;letter-spacing:1px;">ปิด</button>
    </div>
</div>

<script>
function handleSignup() { document.getElementById('modal').style.display = 'flex'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function saveEmail() {
    var email = document.getElementById('waitlist-email').value;
    if (!email || !email.includes('@')) { alert('กรุณากรอก email ให้ถูกต้อง'); return; }
    alert('บันทึกแล้ว! เราจะแจ้งเตือนคุณเมื่อระบบพร้อม');
    closeModal();
}
</script>
</body>
</html>
