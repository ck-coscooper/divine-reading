<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE D'VINE ROOM | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ivory-bg: #fcfcf9; 
            --emerald-void: #062c1a;
            --emerald-deep: #041f13;
            --gold-main: #d4af37;
            --gold-bright: #f5d67b;
            --gold-line: rgba(212,175,55,0.25);
        }

        * { box-sizing:border-box; margin:0; padding:0; text-decoration: none !important; }
        html,body { overflow-x:hidden; width:100%; min-height: 100vh; }
        
        body { 
            background-color: var(--ivory-bg); 
            color: var(--emerald-void); 
            font-family: 'IBM Plex Sans Thai', sans-serif; 
            -webkit-font-smoothing: antialiased; 
            display: flex; flex-direction: column;
        }

        /* Paper Texture Layer */
        body::before { 
            content:''; position:fixed; inset:0; opacity:0.12; 
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            pointer-events:none; z-index:0; 
        }

        .gold-text { 
            background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); 
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent; 
        }
        
        header {
            background: linear-gradient(180deg, rgba(6, 44, 26, 0.99) 0%, rgba(4, 31, 19, 0.97) 100%);
            border-bottom: 1px solid var(--gold-line);
            padding: 18px 0; z-index: 10;
        }

        .auth-card {
            background: var(--emerald-void);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212,175,55,0.08) 0%, transparent 50%),
                url("https://www.transparenttextures.com/patterns/asfalt-dark.png"), 
                linear-gradient(145deg, var(--emerald-void) 0%, var(--emerald-deep) 100%);
            border: 1px solid var(--gold-line); 
            padding: 50px 40px;
            position: relative; width: 100%; max-width: 500px;
            margin: 40px auto; box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            z-index: 1;
        }

        /* Inner Frame */
        .auth-card::before {
            content: ""; position: absolute; inset: 12px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            pointer-events: none; z-index: 2;
        }

        .section-divider {
            border-top: 1px solid rgba(212,175,55,0.15);
            margin: 30px 0 25px; padding-top: 25px; position: relative;
        }

        .input-label {
            font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 600; 
            letter-spacing: 2.5px; color: var(--gold-main); 
            text-transform: uppercase; display: block; margin-bottom: 8px;
        }

        input {
            width: 100%; background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(212, 175, 55, 0.2) !important;
            color: #ffffff !important; padding: 12px 16px !important;
            font-family: 'IBM Plex Sans Thai', sans-serif; font-size: 14px;
            transition: all 0.4s ease; border-radius: 1px;
        }

        input:focus {
            outline: none; background: rgba(255, 255, 255, 0.06) !important;
            border-color: var(--gold-main) !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .btn-create {
            width: 100%; padding: 16px; border: none; cursor: pointer;
            background: linear-gradient(45deg, #B38728, #FBF5B7, #AA771C);
            color: var(--emerald-deep); font-family: 'Cinzel', serif;
            font-size: 11px; font-weight: 800; letter-spacing: 3px;
            transition: all 0.4s ease; margin-top: 20px;
        }

        .btn-create:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .footer-link {
            font-family: 'Inter', sans-serif; font-size: 11px;
            letter-spacing: 2px; color: var(--emerald-void);
            opacity: 0.5; transition: 0.3s;
        }

        @media (max-width: 640px) {
            .auth-card { padding: 40px 20px; border: none; background: none; box-shadow: none; margin: 10px auto; }
            .auth-card::before { display: none; }
            body { background-color: var(--emerald-void); }
            body::before { display: none; }
            .footer-link { color: #fff; opacity: 0.7; }
        }
    </style>
</head>
<body>

<header>
    <div style="text-align:center;">
        <h1 class="gold-text" style="font-family:'Cinzel',serif;font-size:1.4rem;letter-spacing:0.5em;font-weight:700;">THE D'VINE ROOM</h1>
    </div>
</header>

<div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 20px;">
    
    <div class="auth-card">
        <div style="text-align:center; margin-bottom: 35px;">
            <h2 style="font-family:'Cinzel',serif; font-size: 1.1rem; letter-spacing: 5px; color: var(--gold-bright);">SIGN UP</h2>
            <p style="font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 8px; letter-spacing: 1px;">Join the Circle of Sovereignty</p>
        </div>

        <div style="display:grid; gap:20px;">
            <div>
                <label class="input-label">FullName</label>
                <input type="text" placeholder="ระบุชื่อ-นามสกุลของท่าน">
            </div>
            <div>
                <label class="input-label">Email Address</label>
                <input type="email" placeholder="your@email.com">
            </div>
            <div>
                <label class="input-label">Secure Password</label>
                <input type="password" placeholder="••••••••••••">
            </div>
        </div>

        <div class="section-divider">
            <p style="font-family:'Cinzel',serif; font-size: 10px; letter-spacing: 4px; color: var(--gold-main); margin-bottom: 20px; text-align: center;">Birth Coordinates</p>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 15px;">
                <div>
                    <label class="input-label" style="font-size: 8px; letter-spacing: 1px;">Day</label>
                    <input type="number" placeholder="DD" min="1" max="31">
                </div>
                <div>
                    <label class="input-label" style="font-size: 8px; letter-spacing: 1px;">Month</label>
                    <input type="number" placeholder="MM" min="1" max="12">
                </div>
                <div>
                    <label class="input-label" style="font-size: 8px; letter-spacing: 1px;">Year (BE)</label>
                    <input type="text" placeholder="25XX">
                </div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px;">
                <div>
                    <label class="input-label" style="font-size: 8px; letter-spacing: 1px;">Hour</label>
                    <input type="number" placeholder="HH" min="0" max="23">
                </div>
                <div>
                    <label class="input-label" style="font-size: 8px; letter-spacing: 1px;">Minute</label>
                    <input type="number" placeholder="MM" min="0" max="59">
                </div>
            </div>

            <div>
                <label class="input-label" style="font-size: 8px; letter-spacing: 1px;">Location of Birth</label>
                <input type="text" placeholder="City, Province, Country">
            </div>
        </div>

        <button onclick="handleSignup()" class="btn-create">CREATE ACCOUNT</button>

        <div style="margin-top: 25px; text-align: center;">
            <p style="font-size: 11px; color: rgba(255,255,255,0.4);">Already a member? 
                <a href="signin.html" style="color: var(--gold-main); font-weight: 700; margin-left: 5px;">Sign In</a>
            </p>
        </div>
    </div>

    <a href="index.html" class="footer-link" style="margin-top: 20px;">← RETURN HOME</a>
</div>

<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(10px);">
    <div style="background: var(--emerald-void); border: 1px solid var(--gold-main); padding: 50px 40px; max-width: 400px; width: 90%; text-align: center;">
        <h3 style="font-family:'Cinzel',serif; font-size: 1.1rem; letter-spacing: 4px; color: var(--gold-main); margin-bottom: 20px;">COMING SOON</h3>
        <p style="font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.8; margin-bottom: 30px;">
            Celestial registration is being calibrated. <br>Leave your email to be the first to enter.
        </p>
        <input type="email" id="waitlist-email" placeholder="your@email.com" style="margin-bottom: 20px;">
        <button onclick="saveEmail()" class="btn-create" style="margin-top: 0;">NOTIFY ME</button>
        <button onclick="closeModal()" style="background:none; border:none; cursor:pointer; color:rgba(255,255,255,0.3); font-size:10px; margin-top:20px; letter-spacing:2px;">DISMISS</button>
    </div>
</div>

<script>
function handleSignup() { document.getElementById('modal').style.display = 'flex'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function saveEmail() {
    var email = document.getElementById('waitlist-email').value;
    if (!email || !email.includes('@')) { alert('Please enter a valid celestial address.'); return; }
    alert('Recorded. We will notify you when the gateway opens.');
    closeModal();
}
</script>

</body>
</html>
