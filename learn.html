<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE D'VINE ROOM | Learn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ivory-bg: #fcfcf9; 
            --emerald-void: #062c1a;
            --emerald-deep: #041f13;
            --gold-main: #d4af37;
            --gold-bright: #f5d67b;
            --gold-line: rgba(212,175,55,0.28);
            --white-ivory: rgba(252, 252, 249, 0.98);
        }

        * { box-sizing:border-box; margin:0; padding:0; text-decoration:none !important; }
        html, body { overflow-x:hidden; width:100%; min-height:100vh; scroll-behavior:smooth; }
        
        body { 
            background-color: var(--ivory-bg); 
            color: var(--emerald-void); 
            font-family: 'IBM Plex Sans Thai', sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }

        body::before { 
            content:''; position:fixed; inset:0; opacity:0.12; 
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            pointer-events:none; z-index:0; 
        }

        .gold-text { 
            background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); 
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent; 
        }
        
        header {
            position: sticky; top: 0; z-index: 100;
            background: linear-gradient(180deg, rgba(6,44,26,0.99) 0%, rgba(4,31,19,0.97) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--gold-line);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }

        .nav-link { 
            font-family: 'Cinzel', serif;
            font-weight: 700;
            text-transform: uppercase; 
            color: #ffffff;
            border-bottom: 2px solid transparent;
            display: block; 
            padding: 10px clamp(10px, 2.5vw, 22px);
            font-size: clamp(9px, 2.2vw, 13px); 
            letter-spacing: clamp(1px, 0.4vw, 3px);
            transition: all 0.3s;
            opacity: 0.65;
            white-space: nowrap;
        }
        .nav-link:hover, .nav-link.active { 
            color: var(--gold-main); opacity: 1; letter-spacing: clamp(2px, 0.5vw, 4px); 
        }
        .nav-link.active { border-bottom: 2px solid var(--gold-main); }

        /* ── BENTO GRID ── */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: clamp(14px, 3vw, 30px);
            max-width: 1100px;
            margin: 0 auto;
        }

        .bento-item {
            background: var(--emerald-void);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212,175,55,0.08) 0%, transparent 50%),
                url("https://www.transparenttextures.com/patterns/asfalt-dark.png"), 
                linear-gradient(145deg, var(--emerald-void) 0%, var(--emerald-deep) 100%);
            border: 1px solid var(--gold-line); 
            padding: clamp(28px, 5vw, 50px) clamp(20px, 4vw, 40px);
            position: relative;
            transition: all 0.8s cubic-bezier(0.15, 0.83, 0.66, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: clamp(160px, 30vw, 260px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 1;
            -webkit-tap-highlight-color: transparent;
        }

        .bento-item::before {
            content: ""; position: absolute; inset: 12px;
            border: 1px solid rgba(212,175,55,0.08);
            pointer-events: none; z-index: 2; transition: all 0.7s ease;
        }

        .bento-item::after {
            content: ""; position: absolute;
            top: 20px; left: 20px; right: 20px; bottom: 20px;
            background: 
                linear-gradient(to right, var(--gold-main) 1.5px, transparent 1.5px) 0 0,
                linear-gradient(to bottom, var(--gold-main) 1.5px, transparent 1.5px) 0 0,
                linear-gradient(to left, var(--gold-main) 1.5px, transparent 1.5px) 100% 100%,
                linear-gradient(to top, var(--gold-main) 1.5px, transparent 1.5px) 100% 100%;
            background-repeat: no-repeat;
            background-size: clamp(10px,2vw,15px) clamp(10px,2vw,15px);
            opacity: 0.15; transition: all 0.6s ease;
            pointer-events: none; z-index: 2;
        }

        @media (hover: hover) {
            .bento-item:hover {
                transform: translateY(-10px) scale(1.02);
                border-color: var(--gold-bright);
            }
        }

        .bento-title {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 700;
            color: var(--gold-main);
            letter-spacing: 1px;
            margin-bottom: 6px;
            z-index: 5;
            transition: all 0.4s ease;
        }

        .bento-tag {
            font-family: 'Inter', sans-serif;
            font-size: clamp(8px, 1.8vw, 9px);
            font-weight: 600;
            letter-spacing: clamp(2px, 0.8vw, 4px);
            color: rgba(232,224,208,0.55);
            text-transform: uppercase;
            z-index: 5;
        }

        .bento-number {
            position: absolute;
            top: clamp(16px, 3vw, 30px);
            right: clamp(20px, 4vw, 40px);
            font-family: 'Cinzel', serif;
            font-size: clamp(44px, 10vw, 72px);
            font-weight: 700;
            color: var(--white-ivory);
            line-height: 1;
            opacity: 0.92;
            z-index: 1;
            transition: all 0.9s cubic-bezier(0.15, 0.83, 0.66, 1);
        }

        .section-header h2 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.2rem, 10vw, 5rem);
            letter-spacing: clamp(0.15em, 2vw, 0.25em);
            font-weight: 700;
            color: var(--emerald-void);
            line-height: 0.9;
        }

        /* ── MOBILE ── */
        @media (max-width: 480px) {
            .bento-grid {
                grid-template-columns: 1fr;
                gap: 16px;
                padding: 0 4px;
            }
            .bento-item[style*="grid-row: span 2"],
            .bento-item[style*="grid-column: span 2"] {
                grid-row: unset !important;
                grid-column: unset !important;
                min-height: 150px !important;
            }
            main { padding: 2.5rem 1rem 5rem !important; }
            .section-header { margin-bottom: 2.5rem !important; }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            .bento-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
                padding: 0 8px;
            }
            .bento-item[style*="grid-column: span 2"] {
                grid-column: span 2 !important;
                min-height: 140px !important;
            }
            .bento-item[style*="grid-row: span 2"] {
                grid-row: unset !important;
                min-height: 180px !important;
            }
            main { padding: 3rem 1.2rem 6rem !important; }
        }
    </style>
</head>
<body>

<header>
    <div style="display:flex;justify-content:flex-end;align-items:center;padding:7px 20px;gap:12px;border-bottom:1px solid rgba(212,175,55,0.08);">
        <div style="display:flex;gap:8px;">
            <button style="background:none;border:none;cursor:pointer;font-size:9px;letter-spacing:2px;color:#D4AF37;font-weight:700;">TH</button>
            <span style="color:#D4AF37;opacity:0.2;font-size:9px;">|</span>
            <button style="background:none;border:none;cursor:pointer;font-size:9px;letter-spacing:2px;color:#D4AF37;opacity:0.35;font-weight:700;">EN</button>
        </div>
        <span style="color:#D4AF37;opacity:0.1;">·</span>
        <button style="background:none;border:none;cursor:pointer;color:rgba(252,252,249,0.55);font-size:9px;letter-spacing:2px;font-weight:500;">SIGN IN</button>
        <button style="background:linear-gradient(45deg,#B38728,#FBF5B7,#AA771C);border:none;cursor:pointer;font-size:9px;font-weight:800;color:#041f13;padding:5px 12px;border-radius:1px;letter-spacing:1px;">SIGN UP</button>
    </div>
    
    <div style="text-align:center;padding:14px 16px 10px;">
        <h1 class="gold-text" style="font-family:'Cinzel',serif;font-size:clamp(1rem,4vw,2.2rem);letter-spacing:clamp(4px,1.5vw,10px);font-weight:700;">THE D'VINE ROOM</h1>
        <p class="gold-text" style="font-family:'Cinzel',serif;font-size:clamp(7px,1.8vw,11px);letter-spacing:clamp(1px,0.4vw,2px);margin-top:3px;opacity:0.85;">SCARS OF THE DIVINE / AJ. FAAN</p>
    </div>

    <nav style="border-top:1px solid rgba(212,175,55,0.12);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;">
        <div style="display:flex;justify-content:center;min-width:fit-content;padding:0 8px;">
            <a href="learn.html" class="nav-link active">LEARN</a>
            <a href="tarot.html" class="nav-link">TAROT</a>
            <a href="index.html" class="nav-link">READING</a>
            <a href="almanac.html" class="nav-link">ALMANAC</a>
            <a href="community.html" class="nav-link">COMMUNITY</a>
        </div>
    </nav>
</header>

<main style="padding:3rem 1.5rem 8rem; position:relative; z-index:1;">
    <div class="section-header" style="margin-bottom:3.5rem; text-align:center;">
        <h2>LEARN</h2>
        <div style="width:44px;height:1px;background:var(--gold-main);margin:20px auto;opacity:0.6;"></div>
        <p style="text-transform:uppercase;letter-spacing:0.45em;font-size:clamp(8px,2vw,10px);opacity:0.55;">The Sovereign Knowledge Archive</p>
    </div>

    <div class="bento-grid">
        <a href="articles.html" class="bento-item" style="grid-row: span 2;">
            <div class="bento-number">01</div>
            <div class="bento-title">บทความ</div>
            <div class="bento-tag">DEEP INSIGHTS →</div>
        </a>
        
        <a href="course.html" class="bento-item">
            <div class="bento-number">02</div>
            <div class="bento-title">คอร์สเรียน</div>
            <div class="bento-tag">MASTERCLASS →</div>
        </a>
        
        <a href="ebook.html" class="bento-item">
            <div class="bento-number">03</div>
            <div class="bento-title">Ebook</div>
            <div class="bento-tag">DIGITAL LIBRARY →</div>
        </a>
        
        <a href="crystal.html" class="bento-item" style="grid-column: span 2; min-height: 160px;">
            <div class="bento-number">04</div>
            <div class="bento-title" style="margin-bottom:4px;">หินจักระ</div>
            <div class="bento-tag">ENERGY & HEALING →</div>
        </a>
    </div>
</main>

<script>
    /* มือถือ: กดครั้งเดียวไปเลย */
    if ('ontouchstart' in window) {
        document.querySelectorAll('.bento-item').forEach(item => {
            item.addEventListener('touchstart', () => {
                item.style.transform = 'scale(0.97)';
                item.style.transition = 'all 0.12s ease';
            }, {passive: true});
            item.addEventListener('touchend', () => {
                item.style.transform = '';
                item.style.transition = 'all 0.5s cubic-bezier(0.15, 0.83, 0.66, 1)';
            }, {passive: true});
        });

        /* nav กดครั้งเดียว */
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('touchend', function(e) {
                e.preventDefault();
                window.location.href = this.href;
            });
        });
    }
</script>
</body>
</html>
