<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE D'VINE ROOM | Learn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ivory-bg: #fcfcf9; 
            --emerald-void: #062c1a;
            --emerald-deep: #041f13;
            --gold-main: #d4af37;
            --gold-bright: #f5d67b;
            --gold-line: rgba(212,175,55,0.28);
            --white-ivory: rgba(252, 252, 249, 0.98);
        }

        * { box-sizing:border-box; margin:0; padding:0; text-decoration: none !important; }
        html,body { overflow-x:hidden; width:100%; min-height: 100vh; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--ivory-bg); 
            color: var(--emerald-void); 
            font-family: 'IBM Plex Sans Thai', sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }

        /* Paper Texture Overlay */
        body::before { 
            content:''; position:fixed; inset:0; opacity:0.12; 
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            pointer-events:none; z-index:0; 
        }

        .gold-text { 
            background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        header {
            position: sticky; top: 0; z-index: 100;
            background: linear-gradient(180deg, rgba(6, 44, 26, 0.99) 0%, rgba(4, 31, 19, 0.97) 100%);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--gold-line);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }

        .nav-link { 
            font-family:'Cinzel',serif; font-weight:700; text-transform:uppercase; 
            color:#ffffff; border-bottom:2px solid transparent; display:block; 
            padding:14px clamp(12px,2vw,26px); font-size:11px; 
            letter-spacing: 0.3em; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); opacity: 0.65;
        }
        .nav-link:hover, .nav-link.active { color:var(--gold-main); opacity: 1; letter-spacing: 0.35em; }
        .nav-link.active { border-bottom: 2px solid var(--gold-main); }

        /* --- THE SOVEREIGN FRAME SYSTEM (ENHANCED) --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 35px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .bento-item {
            background: var(--emerald-void);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212,175,55,0.08) 0%, transparent 50%),
                url("https://www.transparenttextures.com/patterns/asfalt-dark.png"), 
                linear-gradient(145deg, var(--emerald-void) 0%, var(--emerald-deep) 100%);
            border: 1px solid var(--gold-line); 
            padding: 60px 50px;
            position: relative;
            transition: all 0.8s cubic-bezier(0.15, 0.83, 0.66, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 290px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            z-index: 1;
        }

        /* Inner Frame Line - Sophisticated precision */
        .bento-item::before {
            content: "";
            position: absolute;
            inset: 15px;
            border: 1px solid rgba(212, 175, 55, 0.08);
            pointer-events: none;
            z-index: 2;
            transition: all 0.7s ease;
        }

        /* Corner Brackets Detail - Handcrafted feel */
        .bento-item::after {
            content: "";
            position: absolute;
            top: 25px; left: 25px; right: 25px; bottom: 25px;
            background: 
                linear-gradient(to right, var(--gold-main) 1.5px, transparent 1.5px) 0 0,
                linear-gradient(to bottom, var(--gold-main) 1.5px, transparent 1.5px) 0 0,
                linear-gradient(to left, var(--gold-main) 1.5px, transparent 1.5px) 100% 100%,
                linear-gradient(to top, var(--gold-main) 1.5px, transparent 1.5px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 18px 18px;
            opacity: 0.15;
            transition: all 0.6s ease;
            pointer-events: none;
            z-index: 2;
        }

        .bento-item:hover {
            transform: translateY(-18px) scale(1.025);
            box-shadow: 0 50px 100px rgba(6, 44, 26, 0.6);
            border-color: var(--gold-bright);
        }

        .bento-item:hover::before { border-color: rgba(212, 175, 55, 0.35); inset: 18px; }
        .bento-item:hover::after { opacity: 0.9; top: 18px; left: 18px; right: 18px; bottom: 18px; }

        /* Typography Refinement: Thai Authority */
        .bento-title {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--gold-main);
            letter-spacing: 1px;
            margin-bottom: 12px;
            z-index: 5;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }

        .bento-item:hover .bento-title {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .bento-tag {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 6px;
            color: rgba(232, 224, 208, 0.55);
            text-transform: uppercase;
            z-index: 5;
            transition: all 0.5s ease;
        }

        .bento-item:hover .bento-tag { color: var(--gold-bright); transform: translateX(12px); }

        .bento-number {
            position: absolute;
            top: 40px; right: 50px;
            font-family: 'Cinzel', serif;
            font-size: 88px;
            font-weight: 700;
            color: var(--white-ivory);
            line-height: 1;
            transition: all 0.9s cubic-bezier(0.15, 0.83, 0.66, 1);
            pointer-events: none;
            opacity: 0.92;
            text-shadow: 0 15px 30px rgba(0,0,0,0.7);
            z-index: 1;
        }

        .bento-item:hover .bento-number {
            opacity: 1;
            transform: scale(1.18) translateY(-8px);
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
        }

        .section-header h2 {
            font-family: 'Cinzel', serif;
            font-size: clamp(3.5rem, 9vw, 6.5rem);
            letter-spacing: 0.35em;
            font-weight: 700;
            color: var(--emerald-void);
            line-height: 1;
            text-shadow: 0 10px 20px rgba(6, 44, 26, 0.05);
        }

        .section-header p {
            letter-spacing: 0.7em;
            font-weight: 600;
            font-size: 11px;
            color: var(--emerald-void);
            opacity: 0.55;
            margin-top: 15px;
        }

        @media (max-width: 640px) {
            .bento-grid { grid-template-columns: 1fr; gap: 28px; padding: 0 18px; }
            .bento-item { min-height: 260px; padding: 45px 35px; }
            .bento-number { font-size: 64px; top: 30px; right: 35px; }
            .section-header h2 { letter-spacing: 0.2em; }
        }
    </style>
</head>
<body>
<header>

        <span style="color:#D4AF37;opacity:0.2;font-size:9px;">|</span>
        <button style="background:none;border:none;cursor:pointer;font-size:10px;letter-spacing:3px;color:#D4AF37;opacity:0.35;font-family:'Inter',sans-serif;font-weight:700;">EN</button>
        <span style="color:#D4AF37;opacity:0.1;margin:0 2px;">·</span>
        <button style="background:none;border:none;cursor:pointer;color:rgba(252,252,249,0.55);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:2.5px;font-weight:500;">SIGN IN</button>
        <button style="background:linear-gradient(45deg,#B38728,#FBF5B7,#AA771C);border:none;cursor:pointer;font-size:10px;font-weight:800;color:#041f13;padding:6px 16px;border-radius:1px;font-family:'Inter',sans-serif;letter-spacing:1.5px;box-shadow: 0 4px 15px rgba(179,135,40,0.3);">SIGN UP</button>
    </div>
    <div style="text-align:center;padding:24px 16px 20px;">
        <h1 class="gold-text" style="font-family:'Cinzel',serif;font-size:clamp(1.6rem,4vw,2.8rem);letter-spacing:0.45em;font-weight:700;">THE D'VINE ROOM</h1>
        <p class="gold-text" style="font-family:'Cinzel',serif;font-size:clamp(9px,1.2vw,11px);letter-spacing:0.55em;margin-top:8px;opacity:0.95;font-weight:600;">SCARS OF THE DIVINE / AJ. FAAN</p>
    </div>
    <nav style="border-top:1px solid rgba(212,175,55,0.12);overflow-x:auto;">
      <div style="display:flex;justify-content:center;min-width:fit-content;padding:0 12px;">
        <div class="nav-item"><a href="learn.html" class="nav-link active">LEARN</a></div>
        <div class="nav-item"><a href="tarot.html" class="nav-link">TAROT</a></div>
        <div class="nav-item"><a href="index.html" class="nav-link">READING</a></div>
        <div class="nav-item"><a href="almanac.html" class="nav-link">ALMANAC</a></div>
        <div class="nav-item"><a href="community.html" class="nav-link">COMMUNITY</a></div>
      </div>
    </nav>
</header>

<main style="padding:9rem 1.5rem 12rem; position:relative; z-index:1;">

        <p style="text-transform: uppercase;">The Sovereign Knowledge Archive</p>
    </div>

    <div class="bento-grid">
        <a href="articles.html" class="bento-item" style="grid-row: span 2;">

        <a href="crystal.html" class="bento-item" style="grid-column: span 2; min-height: 190px;">

</main>

<script>
    // Industrial Standard Micro-interactions
    if ('ontouchstart' in window) {
        document.querySelectorAll('.bento-item').forEach(item => {
            item.addEventListener('touchstart', () => { 
                item.style.transform = 'scale(0.97) translateY(0px)';
                item.style.transition = 'all 0.2s ease';
            });
            item.addEventListener('touchend', () => { 
                item.style.transform = 'scale(1) translateY(0px)';
                item.style.transition = 'all 0.5s cubic-bezier(0.15, 0.83, 0.66, 1)';
            });
        });
    }
</script>
</body>
</html>
