<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE D'VINE ROOM | Tarot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ivory-bg: #fcfcf9; 
            --emerald-void: #062c1a;
            --emerald-deep: #041f13;
            --gold-main: #d4af37;
            --gold-bright: #f5d67b;
            --gold-line: rgba(212,175,55,0.3);
            --white-ivory: rgba(252, 252, 249, 0.95);
        }

        * { box-sizing:border-box; margin:0; padding:0; text-decoration: none !important; }
        html,body { overflow-x:hidden; width:100%; min-height: 100vh; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--ivory-bg); 
            color: var(--emerald-void); 
            font-family: 'IBM Plex Sans Thai', sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }

        body::before { 
            content:''; position:fixed; inset:0; opacity:0.1; 
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            pointer-events:none; z-index:0; 
        }

        .gold-text { 
            background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); 
            -webkit-background-clip: text; 
            background-clip: text; /* Standard Property */
            -webkit-text-fill-color: transparent; 
        }
        
        header {
            position: sticky; top: 0; z-index: 100;
            background: linear-gradient(180deg, rgba(6, 44, 26, 0.98) 0%, rgba(4, 31, 19, 0.95) 100%);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--gold-line);
        }

       .nav-link { 
    font-family:'Cinzel',serif; font-weight:700; text-transform:uppercase; 
    color:#ffffff; border-bottom:2px solid transparent; display:block; 
    padding:10px clamp(8px,1.5vw,20px);
    font-size:clamp(10px,1.5vw,14px); 
    letter-spacing:clamp(1px,0.3vw,3px); transition: all 0.3s; opacity: 0.65;
}
        .nav-link:hover, .nav-link.active { color:var(--gold-main); opacity: 1; letter-spacing: 0.3em; }
        .nav-link.active { border-bottom: 2px solid var(--gold-main); }

        /* --- THE SOVEREIGN FRAME SYSTEM --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .bento-item {
            background: var(--emerald-void);
            background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png"), 
                              linear-gradient(145deg, var(--emerald-void) 0%, var(--emerald-deep) 100%);
            border: 1px solid var(--gold-line); 
            padding: 50px 40px;
            position: relative;
            transition: all 0.7s cubic-bezier(0.15, 0.83, 0.66, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 260px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 1;
        }

        .bento-item::before {
            content: ""; position: absolute; inset: 12px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            pointer-events: none; z-index: 2; transition: all 0.6s ease;
        }

        .bento-item::after {
            content: ""; position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px;
            background: 
                linear-gradient(to right, var(--gold-main) 1px, transparent 1px) 0 0,
                linear-gradient(to bottom, var(--gold-main) 1px, transparent 1px) 0 0,
                linear-gradient(to left, var(--gold-main) 1px, transparent 1px) 100% 100%,
                linear-gradient(to top, var(--gold-main) 1px, transparent 1px) 100% 100%;
            background-repeat: no-repeat; background-size: 15px 15px;
            opacity: 0.2; transition: all 0.5s ease; pointer-events: none; z-index: 2;
        }

        .bento-item:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--gold-bright);
        }

        .bento-title {
            font-family: 'Cinzel', serif;
            font-size: 26px; font-weight: 700; color: var(--gold-main);
            letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px;
            z-index: 5; text-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }

        .bento-tag {
            font-family: 'Inter', sans-serif;
            font-size: 9px; font-weight: 600; letter-spacing: 4px;
            color: rgba(232, 224, 208, 0.6); text-transform: uppercase;
            z-index: 5; transition: all 0.4s ease;
        }

        .bento-number {
            position: absolute; top: 30px; right: 40px;
            font-family: 'Cinzel', serif; font-size: 72px;
            font-weight: 700; color: var(--white-ivory);
            line-height: 1; opacity: 0.9; z-index: 1;
            transition: all 0.8s cubic-bezier(0.15, 0.83, 0.66, 1);
        }

        .section-header h2 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 0.25em; font-weight: 700;
            color: var(--emerald-void); line-height: 0.9;
        }

        /* --- MOBILE REFINEMENT --- */
        @media (max-width: 768px) {
            .bento-grid { grid-template-columns: 1fr; gap: 20px; padding: 0 15px; }
            .bento-item { min-height: 220px; padding: 40px 25px; }
            .bento-number { font-size: 54px; top: 20px; right: 25px; }
            .section-header { margin-bottom: 4rem !important; }
            main { padding: 4rem 1.2rem 6rem !important; }
            .bento-item[style*="grid-column: span 2"] { grid-column: span 1 !important; }
        }
    </style>
</head>
<body>
<header>
    <div class="header-inner" style="display:flex;justify-content:flex-end;align-items:center;padding:8px 24px;gap:15px;border-bottom:1px solid rgba(212,175,55,0.05);">
        <div style="display: flex; gap: 10px;">
            <button style="background:none;border:none;cursor:pointer;font-size:9px;letter-spacing:2px;color:#D4AF37;font-weight:600;">TH</button>
            <span style="color:#D4AF37;opacity:0.2;font-size:9px;">|</span>
            <button style="background:none;border:none;cursor:pointer;font-size:9px;letter-spacing:2px;color:#D4AF37;opacity:0.4;font-weight:600;">EN</button>
        </div>
        <span style="color:#D4AF37;opacity:0.1;">·</span>
        <button style="background:none;border:none;cursor:pointer;color:rgba(252,252,249,0.5);font-size:9px;letter-spacing:2px;">SIGN IN</button>
        <button style="background:linear-gradient(45deg,#B38728,#FBF5B7,#AA771C);border:none;cursor:pointer;font-size:9px;font-weight:700;color:#041f13;padding:5px 12px;border-radius:1px;letter-spacing:1px;">SIGN UP</button>
    </div>
    <div style="text-align:center;padding:16px 16px 12px;">
<h1 class="gold-text" style="font-family:'Cinzel',serif;font-size:clamp(1.1rem,3vw,2.2rem);letter-spacing:8px;font-weight:700;">THE D'VINE ROOM</h1>
<p class="gold-text" style="font-family:'Cinzel',serif;font-size:clamp(8px,1.3vw,12px);letter-spacing:1px;margin-top:4px;">SCARS OF THE DIVINE / AJ. FAAN</p>
</div>
    <nav style="border-top:1px solid rgba(212,175,55,0.1);overflow-x:auto;scrollbar-width:none;">
      <div style="display:flex;justify-content:center;min-width:fit-content;padding:0 10px;">
        <a href="learn.html" class="nav-link">LEARN</a>
        <a href="tarot.html" class="nav-link active">TAROT</a>
        <a href="index.html" class="nav-link">READING</a>
        <a href="almanac.html" class="nav-link">ALMANAC</a>
        <a href="community.html" class="nav-link">COMMUNITY</a>
      </div>
    </nav>
</header>

<main style="padding:3rem 1.5rem 8rem; position:relative; z-index:1;">
    <div class="section-header" style="margin-bottom:4rem; text-align: center;">
        <h2>TAROT</h2>
        <div style="width: 50px; height: 1px; background: var(--gold-main); margin: 25px auto; opacity: 0.6;"></div>
        <p style="font-size:10px; margin-top:10px; text-transform: uppercase; letter-spacing: 0.5em;">The Arcane Symbolism Database</p>
    </div>

    <div class="bento-grid">
        <a href="#major" class="bento-item" style="grid-row: span 2;">
            <div class="bento-number">01</div>
            <div class="bento-title">Major Arcana</div>
            <div class="bento-tag">The Great Mysteries →</div>
        </a>
        
        <a href="#minor" class="bento-item">
            <div class="bento-number">02</div>
            <div class="bento-title">Minor Arcana</div>
            <div class="bento-tag">The Elemental Paths →</div>
        </a>
        
        <a href="#all" class="bento-item">
            <div class="bento-number">03</div>
            <div class="bento-title">Card Meanings</div>
            <div class="bento-tag">The Universal Guide →</div>
        </a>
        
        <a href="#spreads" class="bento-item" style="grid-column: span 2; min-height: 180px;">
            <div class="bento-number">04</div>
            <div class="bento-title" style="margin-bottom: 5px;">Tarot Spreads</div>
            <div class="bento-tag">Sacred Geometry Layouts →</div>
        </a>
    </div>
</main>

<script>
    if ('ontouchstart' in window) {
        document.querySelectorAll('.bento-item').forEach(item => {
            item.addEventListener('touchstart', () => { item.style.transform = 'scale(0.98)'; });
            item.addEventListener('touchend', () => { item.style.transform = 'scale(1)'; });
        });
    }
</script>
</body>
</html>
