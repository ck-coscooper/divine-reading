<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE D'VINE ROOM | คอร์สเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ivory-bg: #fcfcf9; 
            --emerald-void: #062c1a;
            --emerald-deep: #041f13;
            --gold-main: #d4af37;
            --gold-bright: #f5d67b;
            --gold-line: rgba(212,175,55,0.28);
            --white-ivory: rgba(252, 252, 249, 0.98);
        }

        * { box-sizing:border-box; margin:0; padding:0; text-decoration: none !important; }
        html,body { overflow-x:hidden; width:100%; min-height: 100vh; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--ivory-bg); 
            color: var(--emerald-void); 
            font-family: 'IBM Plex Sans Thai', sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }

        body::before { 
            content:''; position:fixed; inset:0; opacity:0.12; 
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            pointer-events:none; z-index:0; 
        }

        .gold-text { 
            background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        header {
            position: sticky; top: 0; z-index: 100;
            background: linear-gradient(180deg, rgba(6, 44, 26, 0.99) 0%, rgba(4, 31, 19, 0.97) 100%);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--gold-line);
        }

        .nav-link { 
            font-family:'Cinzel',serif; font-weight:700; text-transform:uppercase; 
            color:#ffffff; border-bottom:2px solid transparent; display:block; 
            padding:14px clamp(12px,2vw,26px); font-size:11px; 
            letter-spacing: 0.3em; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); opacity: 0.65;
        }
        .nav-link:hover, .nav-link.active { color:var(--gold-main); opacity: 1; letter-spacing: 0.35em; }
        .nav-link.active { border-bottom: 2px solid var(--gold-main); }

        /* --- SOVEREIGN EDITORIAL LIST SYSTEM --- */
        .course-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .course-row {
            background: var(--emerald-void);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212,175,55,0.06) 0%, transparent 40%),
                url("https://www.transparenttextures.com/patterns/asfalt-dark.png"), 
                linear-gradient(145deg, var(--emerald-void) 0%, var(--emerald-deep) 100%);
            border: 1px solid var(--gold-line);
            padding: 40px 50px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.7s cubic-bezier(0.15, 0.83, 0.66, 1);
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            z-index: 1;
        }

        /* Inner Frame Line */
        .course-row::before {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(212, 175, 55, 0.08);
            pointer-events: none;
            z-index: 2;
            transition: all 0.6s ease;
        }

        /* Corner Brackets */
        .course-row::after {
            content: "";
            position: absolute;
            top: 18px; left: 18px; right: 18px; bottom: 18px;
            background: 
                linear-gradient(to right, var(--gold-main) 1.5px, transparent 1.5px) 0 0,
                linear-gradient(to bottom, var(--gold-main) 1.5px, transparent 1.5px) 0 0,
                linear-gradient(to left, var(--gold-main) 1.5px, transparent 1.5px) 100% 100%,
                linear-gradient(to top, var(--gold-main) 1.5px, transparent 1.5px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 15px 15px;
            opacity: 0.15;
            transition: all 0.5s ease;
            pointer-events: none;
            z-index: 2;
        }

        .course-row:hover {
            transform: scale(1.02) translateX(15px);
            border-color: var(--gold-bright);
            box-shadow: 0 30px 60px rgba(6, 44, 26, 0.5);
        }

        .course-row:hover::before { border-color: rgba(212, 175, 55, 0.3); inset: 12px; }
        .course-row:hover::after { opacity: 0.8; top: 12px; left: 12px; right: 12px; bottom: 12px; }

        .course-info { display: flex; align-items: center; gap: 40px; z-index: 5; }

        .course-number {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--white-ivory);
            opacity: 0.4;
            min-width: 50px;
            transition: 0.4s;
        }

        .course-row:hover .course-number { opacity: 1; color: var(--gold-main); transform: scale(1.1); }

        .course-title {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: clamp(18px, 2.5vw, 24px);
            font-weight: 700;
            color: var(--gold-main);
            letter-spacing: 0;
            transition: 0.4s;
        }

        .course-row:hover .course-title { color: #ffffff; }

        .course-tag {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 5px;
            color: rgba(232, 224, 208, 0.5);
            text-transform: uppercase;
            z-index: 5;
            transition: 0.5s;
        }

        .course-row:hover .course-tag { color: var(--gold-bright); transform: translateX(10px); }

        @media (max-width: 640px) {
            .course-row { padding: 30px 20px; flex-direction: column; align-items: flex-start; gap: 15px; }
            .course-info { gap: 20px; }
            .course-tag { margin-left: 70px; }
        }
    </style>
</head>
