<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE D'VINE ROOM | Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ivory-bg: #fcfcf9; 
            --emerald-void: #062c1a;
            --emerald-deep: #041f13;
            --gold-main: #d4af37;
            --gold-bright: #f5d67b;
            --gold-line: rgba(212,175,55,0.25);
        }

        * { box-sizing:border-box; margin:0; padding:0; text-decoration:none !important; }
        html, body { overflow-x:hidden; width:100%; min-height:100vh; background-color:var(--ivory-bg); }
        
        body { 
            color: var(--emerald-void); 
            font-family: 'IBM Plex Sans Thai', sans-serif; 
            -webkit-font-smoothing: antialiased; 
            display: flex; flex-direction: column;
        }

        body::before { 
            content:''; position:fixed; inset:0; opacity:0.12; 
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            pointer-events:none; z-index:0; 
        }

        .gold-text { 
            background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); 
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent; 
        }
        
        header {
            background: linear-gradient(180deg, rgba(6,44,26,0.99) 0%, rgba(4,31,19,0.97) 100%);
            border-bottom: 1px solid var(--gold-line);
            padding: 14px 0;
            z-index: 100;
            position: sticky;
            top: 0;
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }

        .auth-card {
            background: var(--emerald-void);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212,175,55,0.08) 0%, transparent 50%),
                url("https://www.transparenttextures.com/patterns/asfalt-dark.png"), 
                linear-gradient(145deg, var(--emerald-void) 0%, var(--emerald-deep) 100%);
            border: 1px solid var(--gold-line); 
            padding: clamp(30px, 6vw, 50px) clamp(20px, 5vw, 40px);
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: clamp(20px, 4vw, 40px) auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            z-index: 1;
        }

        .auth-card::before {
            content: ""; position: absolute; inset: 12px;
            border: 1px solid rgba(212,175,55,0.1);
            pointer-events: none; z-index: 2;
        }

        .input-label {
            font-family: 'Inter', sans-serif;
            font-size: clamp(8px, 1.8vw, 9px);
            font-weight: 600; 
            letter-spacing: 2px;
            color: var(--gold-main); 
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.04) !important;
            border: 1px solid rgba(212,175,55,0.2) !important;
            color: #ffffff !important;
            padding: clamp(10px, 2vw, 12px) 14px !important;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: clamp(13px, 3vw, 14px);
            border-radius: 1px;
            transition: all 0.3s ease;
            /* ป้องกัน iOS zoom เมื่อ focus */
            font-size: max(16px, clamp(13px, 3vw, 14px));
        }

        input:focus {
            outline: none;
            border-color: var(--gold-main) !important;
            background: rgba(255,255,255,0.08) !important;
        }

        .btn-create {
            width: 100%;
            padding: clamp(13px, 3vw, 16px);
            border: none;
            cursor: pointer;
            background: linear-gradient(45deg, #B38728, #FBF5B7, #AA771C);
            color: var(--emerald-deep);
            font-family: 'Cinzel', serif;
            font-size: clamp(10px, 2vw, 11px);
            font-weight: 800;
            letter-spacing: clamp(2px, 0.5vw, 3px);
            margin-top: clamp(18px, 4vw, 25px);
            transition: 0.4s;
            -webkit-tap-highlight-color: transparent;
        }

        @media (hover: hover) {
            .btn-create:hover { filter: brightness(1.1); transform: translateY(-2px); }
        }

        /* ── MOBILE ── */
        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 20px;
                border: none;
                background: none;
                background-image: none;
                box-shadow: none;
                margin: 0 auto;
            }
            .auth-card::before { display: none; }
            body { background-color: var(--emerald-void); }
            body::before { display: none; }
            header { background: var(--emerald-deep); }

            /* birth grid: วันเดือนปีเต็มแถว */
            .birth-dmy {
                grid-template-columns: 1fr 1fr 1fr !important;
                gap: 8px !important;
            }
            .birth-hm {
                grid-template-columns: 1fr 1fr !important;
                gap: 8px !important;
            }
        }

        @media (min-width: 481px) and (max-width: 640px) {
            .auth-card { padding: 36px 28px; }
        }
    </style>
</head>
<body>

<header>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0 clamp(16px,4vw,24px);max-width:1200px;margin:0 auto;">
        <h1 class="gold-text" style="font-family:'Cinzel',serif;font-size:clamp(0.85rem,3.5vw,1.1rem);letter-spacing:clamp(3px,1vw,6px);font-weight:700;">THE D'VINE ROOM</h1>
        <div style="display:flex;gap:clamp(10px,2vw,15px);align-items:center;">
            <a href="signin.html" style="font-family:'Inter',sans-serif;font-size:clamp(8px,1.8vw,9px);color:rgba(255,255,255,0.6);letter-spacing:2px;">SIGN IN</a>
            <a href="index.html" style="font-family:'Inter',sans-serif;font-size:clamp(8px,1.8vw,9px);color:rgba(255,255,255,0.6);letter-spacing:2px;">HOME</a>
        </div>
    </div>
</header>

<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:clamp(12px,3vw,20px);position:relative;z-index:1;">
    <div class="auth-card">
        <div style="text-align:center;margin-bottom:clamp(20px,4vw,30px);">
            <h2 style="font-family:'Cinzel',serif;font-size:clamp(1rem,4vw,1.2rem);letter-spacing:clamp(3px,1vw,5px);color:var(--gold-bright);">CREATE ACCOUNT</h2>
            <p style="font-size:clamp(9px,2vw,10px);color:rgba(255,255,255,0.4);margin-top:8px;letter-spacing:1px;">Enter the Sovereign Gateway</p>
        </div>

        <div style="display:grid;gap:clamp(14px,3vw,18px);">
            <div>
                <label class="input-label">Identity / Name</label>
                <input type="text" placeholder="Full Name">
            </div>
            <div>
                <label class="input-label">Communication / Email</label>
                <input type="email" placeholder="your@email.com">
            </div>
            
            <div style="border-top:1px solid rgba(212,175,55,0.15);margin-top:8px;padding-top:clamp(16px,3vw,20px);">
                <p style="font-family:'Cinzel',serif;font-size:clamp(9px,2vw,10px);letter-spacing:3px;color:var(--gold-main);margin-bottom:clamp(14px,3vw,18px);">Birth Coordinates</p>
                
                <div class="birth-dmy" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;">
                    <div>
                        <label class="input-label" style="font-size:clamp(7px,1.5vw,8px);">Day</label>
                        <input type="number" placeholder="DD" inputmode="numeric">
                    </div>
                    <div>
                        <label class="input-label" style="font-size:clamp(7px,1.5vw,8px);">Month</label>
                        <input type="number" placeholder="MM" inputmode="numeric">
                    </div>
                    <div>
                        <label class="input-label" style="font-size:clamp(7px,1.5vw,8px);">Year (BE)</label>
                        <input type="text" placeholder="25XX" inputmode="numeric">
                    </div>
                </div>

                <div class="birth-hm" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
                    <div>
                        <label class="input-label" style="font-size:clamp(7px,1.5vw,8px);">Hour</label>
                        <input type="number" placeholder="HH" inputmode="numeric">
                    </div>
                    <div>
                        <label class="input-label" style="font-size:clamp(7px,1.5vw,8px);">Minute</label>
                        <input type="number" placeholder="MM" inputmode="numeric">
                    </div>
                </div>

                <div>
                    <label class="input-label" style="font-size:clamp(7px,1.5vw,8px);">Location</label>
                    <input type="text" placeholder="City, Country">
                </div>
            </div>
        </div>

        <button onclick="alert('System Calibration in Progress')" class="btn-create">ESTABLISH CONNECTION</button>
    </div>
</div>

</body>
</html>
