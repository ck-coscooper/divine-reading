<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE D'VINE ROOM | Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ivory-bg: #fcfcf9; 
            --emerald-void: #062c1a;
            --emerald-deep: #041f13;
            --gold-main: #d4af37;
            --gold-bright: #f5d67b;
            --gold-line: rgba(212,175,55,0.25);
        }

        * { box-sizing:border-box; margin:0; padding:0; text-decoration: none !important; }
        html,body { overflow-x:hidden; width:100%; min-height: 100vh; background-color: var(--ivory-bg); }
        
        body { 
            color: var(--emerald-void); 
            font-family: 'IBM Plex Sans Thai', sans-serif; 
            -webkit-font-smoothing: antialiased; 
            display: flex; flex-direction: column;
        }

        body::before { 
            content:''; position:fixed; inset:0; opacity:0.12; 
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            pointer-events:none; z-index:0; 
        }

        .gold-text { 
            background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); 
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent; 
        }
        
        header {
            background: linear-gradient(180deg, rgba(6, 44, 26, 0.99) 0%, rgba(4, 31, 19, 0.97) 100%);
            border-bottom: 1px solid var(--gold-line);
            padding: 15px 0; z-index: 100; position: sticky; top: 0;
        }

        .auth-card {
            background: var(--emerald-void);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212,175,55,0.08) 0%, transparent 50%),
                url("https://www.transparenttextures.com/patterns/asfalt-dark.png"), 
                linear-gradient(145deg, var(--emerald-void) 0%, var(--emerald-deep) 100%);
            border: 1px solid var(--gold-line); 
            padding: 50px 40px;
            position: relative; width: 100%; max-width: 500px;
            margin: 40px auto; box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            z-index: 1;
        }

        .auth-card::before {
            content: ""; position: absolute; inset: 12px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            pointer-events: none; z-index: 2;
        }

        .input-label {
            font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 600; 
            letter-spacing: 2px; color: var(--gold-main); 
            text-transform: uppercase; display: block; margin-bottom: 8px;
        }

        input {
            width: 100%; background: rgba(255, 255, 255, 0.04) !important;
            border: 1px solid rgba(212, 175, 55, 0.2) !important;
            color: #ffffff !important; padding: 12px 16px !important;
            font-family: 'IBM Plex Sans Thai', sans-serif; font-size: 14px;
            border-radius: 1px; transition: all 0.3s ease;
        }

        input:focus { outline: none; border-color: var(--gold-main) !important; background: rgba(255, 255, 255, 0.08) !important; }

        .btn-create {
            width: 100%; padding: 16px; border: none; cursor: pointer;
            background: linear-gradient(45deg, #B38728, #FBF5B7, #AA771C);
            color: var(--emerald-deep); font-family: 'Cinzel', serif;
            font-size: 11px; font-weight: 800; letter-spacing: 3px;
            margin-top: 25px; transition: 0.4s;
        }

        .btn-create:hover { filter: brightness(1.1); transform: translateY(-2px); }

        @media (max-width: 640px) {
            .auth-card { padding: 40px 20px; border: none; background: none; box-shadow: none; margin: 0 auto; }
            .auth-card::before { display: none; }
            body { background-color: var(--emerald-void); }
            body::before { display: none; }
            header { background: var(--emerald-deep); }
        }
    </style>
</head>
<body>

<header>
    <div style="display:flex; justify-content:space-between; align-items:center; padding: 0 24px; max-width: 1200px; margin: 0 auto;">
        <h1 class="gold-text" style="font-family:'Cinzel',serif; font-size: 1.1rem; letter-spacing: 0.3em; font-weight: 700;">THE D'VINE ROOM</h1>
        <div style="display:flex; gap: 15px; align-items:center;">
            <a href="signin.html" style="font-family:'Inter',sans-serif; font-size: 9px; color: rgba(255,255,255,0.6); letter-spacing: 2px;">SIGN IN</a>
            <a href="index.html" style="font-family:'Inter',sans-serif; font-size: 9px; color: rgba(255,255,255,0.6); letter-spacing: 2px;">HOME</a>
        </div>
    </div>
</header>

<div style="flex:1; display:flex; align-items:center; justify-content:center; padding: 20px;">
    <div class="auth-card">
        <div style="text-align:center; margin-bottom: 30px;">
            <h2 style="font-family:'Cinzel',serif; font-size: 1.2rem; letter-spacing: 5px; color: var(--gold-bright);">CREATE ACCOUNT</h2>
            <p style="font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 8px; letter-spacing: 1px;">Enter the Sovereign Gateway</p>
        </div>

        <div style="display:grid; gap:18px;">
            <div>
                <label class="input-label">Identity / Name</label>
                <input type="text" placeholder="Full Name">
            </div>
            <div>
                <label class="input-label">Communication / Email</label>
                <input type="email" placeholder="your@email.com">
            </div>
            
            <div style="border-top: 1px solid rgba(212,175,55,0.15); margin-top: 10px; padding-top: 20px;">
                <p style="font-family:'Cinzel',serif; font-size: 10px; letter-spacing: 3px; color: var(--gold-main); margin-bottom: 18px;">Birth Coordinates</p>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px;">
                    <div><label class="input-label" style="font-size: 8px;">Day</label><input type="number" placeholder="DD"></div>
                    <div><label class="input-label" style="font-size: 8px;">Month</label><input type="number" placeholder="MM"></div>
                    <div><label class="input-label" style="font-size: 8px;">Year (BE)</label><input type="text" placeholder="25XX"></div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
                    <div><label class="input-label" style="font-size: 8px;">Hour</label><input type="number" placeholder="HH"></div>
                    <div><label class="input-label" style="font-size: 8px;">Minute</label><input type="number" placeholder="MM"></div>
                </div>

                <div>
                    <label class="input-label" style="font-size: 8px;">Location</label>
                    <input type="text" placeholder="City, Country">
                </div>
            </div>
        </div>

        <button onclick="alert('System Calibration in Progress')" class="btn-create">ESTABLISH CONNECTION</button>
    </div>
</div>

</body>
</html>
