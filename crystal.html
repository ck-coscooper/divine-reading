<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE D'VINE ROOM | Crystals - Energy & Healing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IBM+Plex+Sans+Thai:wght@300;500;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --ivory: #fcfcf9; 
            --emerald: #062c1a;
            --gold: #d4af37;
        }

        body { 
            background-color: var(--ivory); 
            color: var(--emerald);
            font-family: 'IBM Plex Sans Thai', sans-serif;
            overflow-x: hidden;
        }

        /* ── HERO TYPOGRAPHY ── */
        .hero-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 15vw, 9rem);
            line-height: 0.85;
            letter-spacing: -0.02em;
            font-weight: 700;
            text-align: center;
        }

        .gold-gradient-text {
            background: linear-gradient(to bottom, #BF953F, #B38728, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ── EDITORIAL CRYSTAL LIST ── */
        .crystal-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .crystal-entry {
            display: flex;
            align-items: center;
            padding: 45px 0;
            border-bottom: 1px solid rgba(6, 44, 26, 0.1);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none !important;
            color: var(--emerald);
        }

        .crystal-entry:hover {
            padding-left: 25px;
            color: var(--gold);
        }

        .crystal-meta {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            opacity: 0.3;
            min-width: 80px;
        }

        .crystal-content {
            flex-grow: 1;
        }

        .crystal-title {
            font-size: clamp(1.2rem, 4.5vw, 2rem);
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 5px;
        }

        .crystal-status {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0.5;
            font-weight: 600;
        }

        /* ── MOBILE OPTIMIZATION ── */
        @media (max-width: 768px) {
            .hero-title { font-size: clamp(3rem, 18vw, 6rem); }
            .crystal-entry { padding: 35px 0; }
            .crystal-meta { min-width: 50px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-[#062c1a] text-white py-4 px-6 border-b border-[#d4af37]/20">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xs tracking-[0.4em] font-cinzel hover:text-[#d4af37] transition-colors duration-300">THE D'VINE ROOM</a>
            
            <nav class="hidden md:flex gap-8 text-[10px] tracking-[0.3em] font-cinzel opacity-70">
                <a href="index.html" class="hover:text-[#d4af37] transition-colors">← HOME</a>
                <a href="learn.html" class="text-[#d4af37]">LEARN</a>
                <a href="tarot.html" class="hover:text-[#d4af37]">TAROT</a>
                <a href="reading.html" class="hover:text-[#d4af37]">READING</a>
                <a href="almanac.html" class="hover:text-[#d4af37]">ALMANAC</a>
                <a href="community.html" class="hover:text-[#d4af37]">COMMUNITY</a>
            </nav>
            
            <a href="signup.html" class="text-[9px] border border-[#d4af37]/40 px-3 py-1 uppercase font-bold tracking-widest hover:bg-[#d4af37] hover:text-[#062c1a] transition-all">Sign Up</a>
        </div>
    </header>

    <main class="py-20">
        <section class="mb-32 px-6 text-center">
            <a href="learn.html" class="inline-block mb-12 text-[10px] tracking-[0.3em] uppercase opacity-40 hover:opacity-100 transition-opacity">← Back to Archive</a>
            <p class="text-[10px] tracking-[0.8em] uppercase mb-8 opacity-40">Energy & Sovereign Healing</p>
            <h1 class="hero-title">CRYSTAL<br><span class="gold-gradient-text">ENERGY</span></h1>
            <div class="flex justify-center mt-12">
                <div class="w-[1px] h-20 bg-[#062c1a]/20"></div>
            </div>
        </section>

        <div class="crystal-container">
            <a href="crystal-detail-1.html" class="crystal-entry">
                <div class="crystal-meta">01</div>
                <div class="crystal-content">
                    <h2 class="crystal-title">หินประจำวันเกิดและจักระ</h2>
                    <p class="crystal-status">Energy Guide →</p>
                </div>
            </a>

            <div class="crystal-entry opacity-40">
                <div class="crystal-meta">02</div>
                <div class="crystal-content">
                    <h2 class="crystal-title">พลังแห่งควอตซ์และการบำบัด</h2>
                    <p class="crystal-status">Coming Soon</p>
                </div>
            </div>

            <div class="crystal-entry opacity-40">
                <div class="crystal-meta">03</div>
                <div class="crystal-content">
                    <h2 class="crystal-title">การล้างพลังงานลบออกจากหิน</h2>
                    <p class="crystal-status">Coming Soon</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-20 text-center border-t border-[#062c1a]/5">
        <p class="font-cinzel text-[9px] tracking-[1em] opacity-30 uppercase">Aj. Faan / Scars of the Divine</p>
    </footer>

    <script>
        if ('ontouchstart' in window) {
            document.querySelectorAll('.crystal-entry').forEach(link => {
                link.addEventListener('touchend', function(e) {
                    if (this.getAttribute('href') && this.getAttribute('href') !== '#') {
                        window.location.href = this.getAttribute('href');
                    }
                });
            });
        }
    </script>
</body>
</html>
